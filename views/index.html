<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TemplateCraft — Test</title>
  <style>
    body { font-family: monospace; margin: 2rem; background: #1a1a2e; color: #e0e0e0; }
    h1 { color: #64b5f6; }
    h2 { color: #81c784; margin-top: 2rem; }
    pre { background: #16213e; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #333; white-space: pre-wrap; }
    .output { margin-top: 1rem; }
    button { background: #64b5f6; color: #000; border: none; padding: 0.75rem 1.5rem; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; margin: 0.5rem 0; }
    button:hover { background: #42a5f5; }
    .stats { color: #ffb74d; }
  </style>
</head>
<body>
  <h1>TemplateCraft — Test Generator</h1>
  <button onclick="runTest()">Generate Article Templates</button>
  <button onclick="runComplexTest()">Generate Client Templates</button>
  <div id="output" class="output"></div>

  <script src="../dist/template-craft.js"></script>
  <script>
    // Simple Article schema (clean JSON Schema)
    const articleSchema = {
      title: "Article",
      type: "object",
      properties: {
        title: { type: "string", minLength: 2, maxLength: 200 },
        category: { type: "string", enum: ["news", "blog", "tutorial", "announcement"] },
        release_date: { type: "string", format: "date-time" },
        description: { type: "string" },
        is_active: { type: "boolean", default: true },
        created_by: { type: "string" },
        created_date: { type: "string", format: "date-time" },
        modified_by: { type: "string" },
        modified_date: { type: "string", format: "date-time" },
      },
      required: ["title", "category"],
      sort: [{ name: "created_date", dir: "desc" }],
      breadcrumb: [{ name: "title", suffix: "" }],
    };

    // Complex Client schema with nested objects and arrays
    const clientSchema = {
      title: "Client",
      type: "object",
      properties: {
        _id: { type: "string", format: "uuid" },
        first_name: { type: "string", minLength: 2, maxLength: 50 },
        last_name: { type: "string", minLength: 2, maxLength: 50 },
        email: { type: "string", format: "email" },
        phone_number: { type: "string", pattern: "^\\d{3}-\\d{3}-\\d{4}$" },
        gender: { type: "string", enum: ["male", "female"] },
        age: { type: "integer", minimum: 14, maximum: 130 },
        license_date: { type: "string", format: "date-time" },
        address: { type: "object", "$ref": "#/$defs/Address" },
        household_members: { type: "array", items: { "$ref": "#/$defs/Member" }, uniqueItems: true },
        household_income: { type: "number", minimum: 30000, maximum: 999999 },
        tags: { type: "array", items: { type: "string" }, uniqueItems: true },
        is_active: { type: "boolean", default: true },
        has_prior_coverage: { type: "boolean" },
        prior_coverage_company: { type: "string", minLength: 2 },
        created_by: { type: "string" },
        created_date: { type: "string", format: "date-time" },
        modified_by: { type: "string" },
        modified_date: { type: "string", format: "date-time" },
      },
      required: ["first_name", "last_name", "gender", "is_active"],
      "$defs": {
        Address: {
          type: "object",
          properties: {
            street: { type: "string" },
            city: { type: "string" },
            state: { type: "string" },
            postal_code: { type: "string" },
          },
          required: ["street", "city", "state", "postal_code"],
        },
        Member: {
          type: "object",
          properties: {
            first_name: { type: "string" },
            middle_initial: { type: "string", minLength: 1, maxLength: 1 },
            last_name: { type: "string" },
          },
          required: ["first_name"],
        },
      },
      allOf: [
        { if: { properties: { has_prior_coverage: { const: true } } }, then: { required: ["prior_coverage_company"] } },
        { if: { properties: { age: { minimum: 16 } } }, then: { required: ["license_date"] } },
        { if: { properties: { modified_by: { minLength: 1 } } }, then: { required: ["modified_date"] } },
      ],
      sort: [{ name: "modified_date", dir: "desc" }],
      breadcrumb: [{ name: "first_name", suffix: " " }, { name: "last_name", suffix: "" }],
    };

    function runTest() {
      const templates = templateCraft.generate(articleSchema, {
        routePrefix: 'x',
        templateType: 'tab-control',
      });
      displayResults(templates, 'Article');
    }

    function runComplexTest() {
      const templates = templateCraft.generate(clientSchema, {
        routePrefix: 'v',
        templateType: 'tab-control',
      });
      displayResults(templates, 'Client');
    }

    function displayResults(templates, name) {
      let html = `<h2>${name} — Generated ${templates.length} templates</h2>`;
      for (const tmpl of templates) {
        const contentLen = tmpl.content.length;
        const codeLen = tmpl.code.length;
        const rulesLen = (tmpl.field_rules || '').length;
        html += `
          <h2>${tmpl.name} (${tmpl.slug})</h2>
          <p class="stats">Content: ${contentLen} chars | Code: ${codeLen} chars | Field Rules: ${rulesLen} chars</p>
          <p class="stats">Type: ${tmpl.template_type} | Route: /${tmpl.route_prefix}/${tmpl.slug} | Depends: ${tmpl.depends.join(', ')}</p>
          <h3>Content Tab</h3>
          <pre>${escapeHtml(tmpl.content)}</pre>
          <h3>Code Tab</h3>
          <pre>${escapeHtml(tmpl.code)}</pre>
        `;
        if (tmpl.field_rules) {
          html += `<h3>Field Rules</h3><pre>${escapeHtml(tmpl.field_rules)}</pre>`;
        }
        html += `<h3>Full Document (JSON)</h3><pre>${escapeHtml(JSON.stringify(tmpl, null, 2))}</pre>`;
      }
      document.getElementById('output').innerHTML = html;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
